spring:
  datasource:
    url: jdbc:h2:mem:freshdeskdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081

spring.h2.console.enabled: true
spring.h2.console.path: /h2-console
